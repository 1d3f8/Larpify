name: Build Android APK

on:
  push:
    branches: [ main, mobile-build ]
  workflow_dispatch:

jobs:
  build-apk:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-11-jdk zip unzip git libffi-dev libssl-dev libsqlite3-dev \
            build-essential autoconf automake libtool pkg-config zlib1g-dev libjpeg-dev libpng-dev \
            libfreetype6-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libmtdev-dev \
            libglu1-mesa-dev libgles2-mesa-dev libxrandr-dev libxinerama-dev libxcursor-dev

      - name: Install Android SDK command-line tools and build-tools
        run: |
          set -eux
          export ANDROID_SDK_ROOT=$HOME/Android/Sdk
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          cd $HOME
          # download command line tools (versioned archive)
          curl -fSLo commandlinetools.zip https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -o commandlinetools.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          # move to 'latest' folder as expected by some tools
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools/latest
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools/* $ANDROID_SDK_ROOT/cmdline-tools/latest/ || true
          rm -f commandlinetools.zip
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
          yes | sdkmanager --sdk_root=${ANDROID_SDK_ROOT} --licenses || true
          sdkmanager --sdk_root=${ANDROID_SDK_ROOT} "platform-tools" "platforms;android-33" "build-tools;33.0.2"
          # Create legacy tools/bin path expected by some tooling (Buildozer looks for tools/bin/sdkmanager)
          mkdir -p $ANDROID_SDK_ROOT/tools/bin
          if [ -x "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
            ln -sf $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager $ANDROID_SDK_ROOT/tools/bin/sdkmanager || true
            chmod +x $ANDROID_SDK_ROOT/tools/bin/sdkmanager || true
          fi
        env:
          JAVA_HOME: /usr/lib/jvm/java-11-openjdk-amd64

      - name: Export Android env vars
        run: |
          echo "ANDROID_SDK_ROOT=$HOME/Android/Sdk" >> $GITHUB_ENV
          echo "ANDROID_HOME=$HOME/Android/Sdk" >> $GITHUB_ENV
          echo "PATH=$HOME/Android/Sdk/cmdline-tools/latest/bin:$HOME/Android/Sdk/platform-tools:$PATH" >> $GITHUB_ENV

      - name: Make Buildozer SDK symlink
        run: |
          # Buildozer expects SDK under ~/.buildozer/android/platform/android-sdk
          mkdir -p $HOME/.buildozer/android/platform
          if [ -d "$HOME/.buildozer/android/platform/android-sdk" ]; then
            echo "Buildozer android-sdk already exists"
          else
            ln -s $HOME/Android/Sdk $HOME/.buildozer/android/platform/android-sdk || true
            echo "Created symlink from $HOME/.buildozer/android/platform/android-sdk -> $HOME/Android/Sdk"
          fi

      - name: "Diagnostic: list SDK and check for aidl/build-tools"
        run: |
          set -eux
          ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-$HOME/Android/Sdk}
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "Listing Buildozer SDK path: $HOME/.buildozer/android/platform/android-sdk"
          ls -la $HOME/.buildozer/android/platform || true
          ls -la $HOME/.buildozer/android/platform/android-sdk || true
          echo "Listing installed Android SDK root"
          ls -la $ANDROID_SDK_ROOT || true
          echo "Listing build-tools directory"
          ls -la $ANDROID_SDK_ROOT/build-tools || true
          for dir in $ANDROID_SDK_ROOT/build-tools/*; do
            echo "--- checking $dir ---"
            ls -la "$dir" || true
            if [ -x "$dir/aidl" ]; then
              echo "Found aidl at $dir/aidl"
              "$dir/aidl" --version || true
            fi
          done
          echo "Which aidl (if in PATH):" || true
          which aidl || true
          echo "Cmdline-tools listing"
          ls -la $ANDROID_SDK_ROOT/cmdline-tools || true

      - name: Install buildozer and cython
        run: |
          python -m pip install --upgrade pip
          python -m pip install cython==0.29.33 buildozer

      - name: Build APK
        working-directory: mobile_spartify
        run: |
          buildozer android debug -v || true

      - name: Upload Buildozer logs (if any)
        if: always()
        run: |
          set -eux
          mkdir -p $GITHUB_WORKSPACE/artifacts/buildozer-logs
          find mobile_spartify/.buildozer -type f -name "*.log" -maxdepth 6 -exec cp --parents {} $GITHUB_WORKSPACE/artifacts/buildozer-logs/ \; || true
          find mobile_spartify/.buildozer -type f -name "*.txt" -maxdepth 6 -exec cp --parents {} $GITHUB_WORKSPACE/artifacts/buildozer-logs/ \; || true

      - name: Upload artifact (logs)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-logs
          path: artifacts/buildozer-logs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spartify-apk
          path: mobile_spartify/bin/*.apk

      - id: create_release
        name: Create GitHub release
        if: always()
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ci-build-${{ github.run_id }}
          release_name: "CI Build ${{ github.run_id }}"
          body: "Automated CI build for run ${{ github.run_id }}"
          draft: false
          prerelease: true

      - name: Upload APK to release
        if: always()
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: mobile_spartify/bin/*.apk
          asset_name: spartify-${{ github.run_id }}.apk
          asset_content_type: application/vnd.android.package-archive
